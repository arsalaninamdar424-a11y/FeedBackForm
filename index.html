<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Feedback Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Customer Feedback Form</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>How did you hear about us?</label>

<select>
<option>Select option</option>
<option>Google</option>
<option>Instagram</option>
<option>Friend</option>
<option>Advertisement</option>
</select>

<label>Rate our Service</label>

<div class="rating">

<label><input type="radio" name="rate"> Poor</label>
<label><input type="radio" name="rate"> Average</label>
<label><input type="radio" name="rate"> Good</label>
<label><input type="radio" name="rate"> Very Good</label>
<label><input type="radio" name="rate"> Excellent</label>

</div>

<label>What did you like about our service?</label>

<div class="checkbox">

<label><input type="checkbox"> Quality</label>
<label><input type="checkbox"> Customer Support</label>
<label><input type="checkbox"> Price</label>
<label><input type="checkbox"> Fast Delivery</label>

</div>

<label>Additional Comments</label>

<textarea rows="5" placeholder="Write your feedback here..."></textarea>

<button type="submit">Submit Feedback</button>

</form>

</div>

</body>
</html>
