<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Feedback Form</title>
<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.container{
background:white;
padding:30px;
width:600px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
h2{
text-align:center;
margin-bottom:20px;
}
label{
font-weight:bold;
display:block;
margin-top:10px;
}
input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}
.radio-group label,
.checkbox-group label{
display:inline-block;
margin-right:15px;
font-weight:normal;
}
.rating span{
font-size:25px;
cursor:pointer;
color:#ccc;
}
.rating span:hover{
color:gold;
}
button{
width:100%;
padding:10px;
margin-top:15px;
background:#667eea;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#5a67d8;
}
#message{
text-align:center;
margin-top:15px;
font-weight:bold;
color:green;
}
</style>
</head>
<body>
<div class="container">
<h2>Customer Feedback Form</h2>
<form id="feedbackForm">
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your name">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">
<label>Age Group</label>
<div class="radio-group">
<label><input type="radio" name="age"> Under 18</label>
<label><input type="radio" name="age"> 18-25</label>
<label><input type="radio" name="age"> 26-35</label>
<label><input type="radio" name="age"> 35+</label>
</div>
<label>How did you hear about us?</label>
<select>
<option>Select Option</option>
<option>Google</option>
<option>Instagram</option>
<option>Friend</option>
<option>Advertisement</option>
</select>
<label>What did you like?</label>
<div class="checkbox-group">
<label><input type="checkbox"> Design</label>
<label><input type="checkbox"> Speed</label>
<label><input type="checkbox"> Support</label>
<label><input type="checkbox"> Price</label>
</div>
<label>Rate our service</label>
<div class="rating">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>
<label>Additional Feedback</label>
<textarea id="feedback" rows="4" placeholder="Write your feedback..."></textarea>
<button type="submit">Submit Feedback</button>
</form>
<p id="message"></p>
</div>
<script>
let rating = 0;
function rate(star){
rating = star;
let stars = document.querySelectorAll(".rating span");
stars.forEach((s,index)=>{
if(index < star)
s.style.color = "gold";
else
s.style.color = "#ccc";
});
}
document.getElementById("feedbackForm").addEventListener("submit",function(e){
e.preventDefault();
let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
if(name === "" || email === "")
{
alert("Please fill all required fields");
return;
}
document.getElementById("message").innerHTML =
"✅ Thank you "+name+"! Your feedback has been submitted.";
this.reset();
let stars = document.querySelectorAll(".rating span");
stars.forEach(s=>s.style.color="#ccc");
});
</script>
</body>
</html>
